name: duoapp
description: Langly is a modern language learning platform

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  intl: ^0.19.0
  go_router: ^13.0.0
  provider: ^6.1.1
  url_launcher: ^6.2.5
  shared_preferences: ^2.2.3
  json_annotation: ^4.9.0
  chopper: ^6.1.4
  logging: ^1.2.0
  flutter_riverpod: ^2.6.1
  freezed_annotation: ^2.4.1
  synchronized: ^3.1.0
  sqlbrite: ^2.6.0
  sqlite3_flutter_libs: ^0.5.18
  web_ffi: ^0.7.2
  sqlite3: ^2.1.0
  drift: ^2.13.1
  firebase_core: ^3.4.0
  firebase_auth: ^5.2.0
  cloud_firestore: ^5.4.0
  firebase_messaging: 15.2.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: "^0.13.1"
  flutter_lints: ^2.0.3
  json_serializable: ^6.8.0
  chopper_generator: ^6.0.3
  freezed: ^2.4.5
  build_runner: ^2.4.9
  drift_dev: ^2.13.2
  mockito: ^5.4.2
  golden_toolkit: ^0.15.0
  flutter_native_splash: ^2.3.6

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/langly_logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/magazines/
    - assets/flags/
    - assets/

flutter_native_splash:
  color: "#ffffff"
  image: "assets/langly_logo.png"
  android: true
  ios: true